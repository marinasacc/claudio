{% extends "base.html" %}

{% block title %}Nuevo Pedido{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title mb-4"><i class="bi bi-plus-circle"></i> Nuevo Pedido</h3>
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-7">
                            <label class="form-label fw-bold">Mes</label>
                            <select name="mes" class="form-select form-select-lg" required>
                                {% for num, nombre in meses.items() %}
                                    <option value="{{ num }}" {% if num == mes_actual %}selected{% endif %}>
                                        {{ nombre }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-5">
                            <label class="form-label fw-bold">Año</label>
                            <input type="number" name="anio" class="form-select form-select-lg"
                                   value="{{ anio_actual }}" min="2024" max="2030" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha del pedido</label>
                        <input type="date" name="fecha_pedido" class="form-control form-control-lg"
                               value="{{ fecha_hoy }}">
                        <small class="text-muted">El día en que realizás este pedido (por defecto hoy)</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de pedido</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo"
                                       value="total" id="tipoTotal" checked>
                                <label class="form-check-label" for="tipoTotal">
                                    <i class="bi bi-calendar-check"></i> Total (el pedido grande del mes)
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo"
                                       value="parcial" id="tipoParcial">
                                <label class="form-check-label" for="tipoParcial">
                                    <i class="bi bi-lightning"></i> Parcial (durante el mes)
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Notas generales</label>
                        <textarea name="notas" class="form-control" rows="2"
                                  placeholder="Notas opcionales para este pedido..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg flex-fill">
                            <i class="bi bi-plus-circle"></i> Crear Pedido
                        </button>
                        <a href="/" class="btn btn-outline-secondary btn-lg">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
