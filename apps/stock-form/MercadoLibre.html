<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5; min-height: 100vh; padding: 12px;
    }
    .container {
      background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 24px; max-width: 700px; width: 100%; margin: 0 auto;
    }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { color: #FFE600; font-size: 22px; margin-bottom: 2px; background: #2D3277; padding: 12px; border-radius: 10px; }
    .header p { color: #888; font-size: 13px; margin-top: 8px; }

    /* Estado de conexion */
    .status-bar {
      padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
      font-size: 13px; display: flex; align-items: center; gap: 8px;
    }
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-error { background: #ffebee; color: #c62828; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-ok .status-dot { background: #2e7d32; }
    .status-error .status-dot { background: #c62828; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid #eee; }
    .tab {
      padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; background: none; color: #888; border-bottom: 3px solid transparent;
      transition: all 0.2s; margin-bottom: -2px;
    }
    .tab.active { color: #2D3277; border-bottom-color: #2D3277; }
    .tab:hover { color: #2D3277; }

    /* Buscador */
    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box input {
      flex: 1; padding: 10px 14px; font-size: 15px; border: 2px solid #ddd;
      border-radius: 10px; outline: none; transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #2D3277; }
    .btn {
      padding: 10px 20px; font-size: 14px; font-weight: 600; border: none;
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-meli { background: #2D3277; color: white; }
    .btn-meli:hover { background: #1a1f5e; }
    .btn-meli:disabled { background: #aaa; cursor: not-allowed; }
    .btn-secondary { background: #f0f2f5; color: #333; }

    /* Publicaciones */
    .pub-card {
      border: 1px solid #e0e0e0; border-radius: 12px; padding: 14px;
      margin-bottom: 10px; display: flex; gap: 12px; transition: box-shadow 0.2s;
    }
    .pub-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .pub-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .pub-info { flex: 1; min-width: 0; }
    .pub-title { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pub-title a { color: #2D3277; text-decoration: none; }
    .pub-title a:hover { text-decoration: underline; }
    .pub-meta { font-size: 12px; color: #888; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
    .pub-price { font-size: 16px; font-weight: 700; color: #333; }
    .pub-stock { font-weight: 600; }
    .stock-ok { color: #2e7d32; }
    .stock-low { color: #e8710a; }
    .stock-zero { color: #c62828; }
    .pub-id { color: #aaa; font-size: 11px; }

    /* Variaciones dentro de publicacion */
    .var-list { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
    .var-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; color: #666; }
    .var-name { flex: 1; }
    .var-stock { font-weight: 600; min-width: 60px; text-align: right; }
    .var-sold { min-width: 60px; text-align: right; color: #aaa; }

    /* Ventas */
    .venta-card {
      border: 1px solid #e0e0e0; border-radius: 12px; padding: 14px;
      margin-bottom: 10px;
    }
    .venta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .venta-fecha { font-size: 13px; color: #888; }
    .venta-total { font-size: 16px; font-weight: 700; color: #2e7d32; }
    .venta-estado { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
    .estado-paid { background: #e8f5e9; color: #2e7d32; }
    .estado-cancelled { background: #ffebee; color: #c62828; }
    .estado-other { background: #f5f5f5; color: #666; }
    .venta-items { font-size: 13px; color: #333; }
    .venta-item { padding: 4px 0; border-bottom: 1px solid #f8f8f8; }
    .venta-comprador { font-size: 12px; color: #aaa; margin-top: 6px; }

    /* Paginacion */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .pagination .btn { font-size: 13px; padding: 8px 16px; }

    /* Loading & empty */
    .loading { text-align: center; padding: 40px; color: #666; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #2D3277; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px; color: #999; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .error-msg { background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }

    .nav-links { text-align: center; margin-top: 20px; padding-top: 14px; border-top: 1px solid #eee; }
    .nav-links a { color: #2D3277; text-decoration: none; font-size: 13px; margin: 0 8px; }

    .summary { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-card { flex: 1; min-width: 80px; background: #f8f9fa; border-radius: 10px; padding: 12px; text-align: center; }
    .summary-card .number { font-size: 22px; font-weight: 700; color: #2D3277; }
    .summary-card .label { font-size: 11px; color: #888; margin-top: 2px; }

    @media (max-width: 500px) {
      .container { padding: 16px; }
      .pub-img { width: 55px; height: 55px; }
      .tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MercadoLibre</h1>
      <p>TUTEXTILHOGARYHOTEL — Panel de consulta</p>
    </div>

    <div id="statusBar" class="status-bar status-error">
      <span class="status-dot"></span>
      <span id="statusText">Verificando conexion...</span>
    </div>

    <div id="mainContent" style="display:none;">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="cambiarTab('publicaciones')">Publicaciones</button>
        <button class="tab" onclick="cambiarTab('ventas')">Ventas</button>
      </div>

      <!-- Tab: Publicaciones -->
      <div id="tabPublicaciones">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar por titulo..." autofocus>
          <button class="btn btn-meli" onclick="buscar()">Buscar</button>
        </div>
        <div id="pubLoading" class="loading" style="display:none;">
          <div class="spinner"></div>
          <p>Cargando publicaciones...</p>
        </div>
        <div id="pubList"></div>
        <div id="pubPagination" class="pagination"></div>
      </div>

      <!-- Tab: Ventas -->
      <div id="tabVentas" style="display:none;">
        <div id="ventasLoading" class="loading" style="display:none;">
          <div class="spinner"></div>
          <p>Cargando ventas...</p>
        </div>
        <div id="ventasList"></div>
      </div>
    </div>

    <div class="nav-links">
      <a href="?page=formulario">Carga stock</a>
      <a href="?page=formulariov2">Stock V2</a>
      <a href="?page=consultar">Consultar stock TN</a>
    </div>
  </div>

  <script>
    var currentOffset = 0;
    var currentLimit = 20;

    // ========== INICIALIZACION ==========
    window.onload = function() {
      google.script.run
        .withSuccessHandler(function(result) {
          var bar = document.getElementById('statusBar');
          var text = document.getElementById('statusText');
          if (result.conectado) {
            bar.className = 'status-bar status-ok';
            text.textContent = 'Conectado como ' + result.nickname;
            document.getElementById('mainContent').style.display = 'block';
            cargarPublicaciones(0);
          } else {
            bar.className = 'status-bar status-error';
            text.textContent = 'No conectado. ' + (result.error || 'Ejecutar autorizarMeli() en Apps Script.');
          }
        })
        .withFailureHandler(function(error) {
          var bar = document.getElementById('statusBar');
          bar.className = 'status-bar status-error';
          document.getElementById('statusText').textContent = 'Error: ' + error.message;
        })
        .verificarConexionMeli();
    };

    // ========== TABS ==========
    function cambiarTab(tab) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.getElementById('tabPublicaciones').style.display = tab === 'publicaciones' ? 'block' : 'none';
      document.getElementById('tabVentas').style.display = tab === 'ventas' ? 'block' : 'none';
      event.target.classList.add('active');

      if (tab === 'ventas') cargarVentas();
    }

    // ========== PUBLICACIONES ==========
    function cargarPublicaciones(offset) {
      currentOffset = offset || 0;
      document.getElementById('pubLoading').style.display = 'block';
      document.getElementById('pubList').innerHTML = '';
      document.getElementById('pubPagination').innerHTML = '';

      google.script.run
        .withSuccessHandler(renderPublicaciones)
        .withFailureHandler(function(e) {
          document.getElementById('pubLoading').style.display = 'none';
          document.getElementById('pubList').innerHTML = '<div class="error-msg">' + e.message + '</div>';
        })
        .getMeliPublicaciones(currentOffset, currentLimit);
    }

    function buscar() {
      var query = document.getElementById('searchInput').value.trim();
      if (!query) { cargarPublicaciones(0); return; }

      document.getElementById('pubLoading').style.display = 'block';
      document.getElementById('pubList').innerHTML = '';
      document.getElementById('pubPagination').innerHTML = '';

      google.script.run
        .withSuccessHandler(function(result) {
          renderPublicaciones({ publicaciones: result.publicaciones, total: result.total, offset: 0, limit: 20 });
        })
        .withFailureHandler(function(e) {
          document.getElementById('pubLoading').style.display = 'none';
          document.getElementById('pubList').innerHTML = '<div class="error-msg">' + e.message + '</div>';
        })
        .buscarMeliPublicaciones(query);
    }

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') buscar();
    });

    function renderPublicaciones(data) {
      document.getElementById('pubLoading').style.display = 'none';
      var pubs = data.publicaciones;

      if (pubs.length === 0) {
        document.getElementById('pubList').innerHTML =
          '<div class="empty-state"><div class="icon">📦</div><p>No se encontraron publicaciones</p></div>';
        return;
      }

      // Summary
      var totalStock = 0;
      pubs.forEach(function(p) { totalStock += p.stockDisponible; });

      var html = '<div class="summary">' +
        '<div class="summary-card"><div class="number">' + data.total + '</div><div class="label">Total publicaciones</div></div>' +
        '<div class="summary-card"><div class="number">' + totalStock + '</div><div class="label">Stock (esta pagina)</div></div>' +
        '</div>';

      for (var i = 0; i < pubs.length; i++) {
        var p = pubs[i];
        var stockClass = 'stock-ok';
        if (p.stockDisponible === 0) stockClass = 'stock-zero';
        else if (p.stockDisponible <= 3) stockClass = 'stock-low';

        html += '<div class="pub-card">';
        if (p.imagen) html += '<img class="pub-img" src="' + p.imagen.replace('http:', 'https:') + '" alt="">';
        html += '<div class="pub-info">';
        html += '<div class="pub-title"><a href="' + p.link + '" target="_blank">' + escapeHtml(p.titulo) + '</a></div>';
        html += '<div class="pub-price">$' + formatNumber(p.precio) + '</div>';
        html += '<div class="pub-meta">';
        html += '<span class="pub-stock ' + stockClass + '">Stock: ' + p.stockDisponible + '</span>';
        html += '<span>Vendidos: ' + p.vendidos + '</span>';
        html += '<span class="pub-id">' + p.id + '</span>';
        html += '</div>';

        // Variaciones
        if (p.variaciones.length > 0) {
          html += '<div class="var-list">';
          for (var v = 0; v < p.variaciones.length; v++) {
            var va = p.variaciones[v];
            var vStockClass = va.stock === 0 ? 'stock-zero' : (va.stock <= 3 ? 'stock-low' : 'stock-ok');
            html += '<div class="var-row">';
            html += '<span class="var-name">' + escapeHtml(va.nombre) + '</span>';
            html += '<span class="var-stock ' + vStockClass + '">Stock: ' + va.stock + '</span>';
            html += '<span class="var-sold">Vend: ' + va.vendidos + '</span>';
            html += '</div>';
          }
          html += '</div>';
        }

        html += '</div></div>';
      }

      document.getElementById('pubList').innerHTML = html;

      // Paginacion
      var pagHtml = '';
      if (data.offset > 0) {
        pagHtml += '<button class="btn btn-secondary" onclick="cargarPublicaciones(' + (data.offset - data.limit) + ')">← Anterior</button>';
      }
      if (data.offset + data.limit < data.total) {
        pagHtml += '<button class="btn btn-meli" onclick="cargarPublicaciones(' + (data.offset + data.limit) + ')">Siguiente →</button>';
      }
      document.getElementById('pubPagination').innerHTML = pagHtml;
    }

    // ========== VENTAS ==========
    function cargarVentas() {
      document.getElementById('ventasLoading').style.display = 'block';
      document.getElementById('ventasList').innerHTML = '';

      google.script.run
        .withSuccessHandler(renderVentas)
        .withFailureHandler(function(e) {
          document.getElementById('ventasLoading').style.display = 'none';
          document.getElementById('ventasList').innerHTML = '<div class="error-msg">' + e.message + '</div>';
        })
        .getMeliVentas(20);
    }

    function renderVentas(data) {
      document.getElementById('ventasLoading').style.display = 'none';
      var ventas = data.ventas;

      if (ventas.length === 0) {
        document.getElementById('ventasList').innerHTML =
          '<div class="empty-state"><div class="icon">🛒</div><p>No se encontraron ventas</p></div>';
        return;
      }

      var html = '<div class="summary">' +
        '<div class="summary-card"><div class="number">' + data.total + '</div><div class="label">Total ventas</div></div>' +
        '</div>';

      for (var i = 0; i < ventas.length; i++) {
        var v = ventas[i];
        var fecha = new Date(v.fecha);
        var fechaStr = fecha.toLocaleDateString('es-AR') + ' ' + fecha.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});

        var estadoClass = 'estado-other';
        var estadoText = v.estado;
        if (v.estado === 'paid') { estadoClass = 'estado-paid'; estadoText = 'Pagada'; }
        else if (v.estado === 'cancelled') { estadoClass = 'estado-cancelled'; estadoText = 'Cancelada'; }

        html += '<div class="venta-card">';
        html += '<div class="venta-header">';
        html += '<span class="venta-fecha">' + fechaStr + '</span>';
        html += '<span class="venta-estado ' + estadoClass + '">' + estadoText + '</span>';
        html += '</div>';
        html += '<div class="venta-total">$' + formatNumber(v.total) + '</div>';
        html += '<div class="venta-items">';
        for (var j = 0; j < v.items.length; j++) {
          var item = v.items[j];
          html += '<div class="venta-item">' + item.cantidad + 'x ' + escapeHtml(item.titulo);
          if (item.sku) html += ' <span style="color:#aaa;">(' + item.sku + ')</span>';
          html += ' — $' + formatNumber(item.precio) + '</div>';
        }
        html += '</div>';
        html += '<div class="venta-comprador">Comprador: ' + escapeHtml(v.comprador) + '</div>';
        html += '</div>';
      }

      document.getElementById('ventasList').innerHTML = html;
    }

    // ========== UTILIDADES ==========
    function escapeHtml(str) {
      if (!str) return '';
      return str.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatNumber(n) {
      if (n === null || n === undefined) return '0';
      return Number(n).toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }
  </script>
</body>
</html>
